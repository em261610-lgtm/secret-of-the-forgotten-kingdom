<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>سر المملكة المنسية 3D</title>
    <!-- استدعاء مكتبة الـ 3D ومكتبة الحركات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- الشاشة الـ 3D -->
    <div id="canvas-container"></div>

    <!-- واجهة اللعبة الشيك جداً -->
    <div class="ui-box" id="ui-box">
        <h1 class="game-title">سر المملكة المنسية</h1>
        <p class="story-p" id="story-text">البلورة النيون بتلف في الفضاء يا زين.. طاقة الشر بدأت تظهر وقمر وعفروتو مستنيين إشارتك! هتبدأ الرحلة؟</p>
        
        <div class="buttons-container">
            <button class="btn btn-primary" onclick="makeChoice(1)">⚔️ اشحن سيف النور واهجم</button>
            <button class="btn btn-secondary" onclick="makeChoice(2)">🔮 استدعي تعويذة قمر السحرية</button>
        </div>
    </div>

    <!-- لوحة التحكم السريعة في الحركة -->
    <div class="joystick-info">المس الشاشة وحرك صباعك عشان تلف الكاميرا 3D حوالين الكريستالة! 🕹️</div>

    <script src="game.js"></script>
</body>
</html>
